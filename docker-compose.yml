version: "3.9"

services:
  qqbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qqbot
    restart: always
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: ${PORT:-8080}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./data:/app/data
    command: ["python", "bot.py"]
